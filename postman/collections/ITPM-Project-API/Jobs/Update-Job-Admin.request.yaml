$kind: http-request
name: Update Job (Admin)
method: PUT
url: '{{baseUrl}}/api/jobs/update/:jobId'
order: 4000
pathVariables:
  - key: jobId
    value: '{{jobId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated Title",
      "isActive": true
    }
