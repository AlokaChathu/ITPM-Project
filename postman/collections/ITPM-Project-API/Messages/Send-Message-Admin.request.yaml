$kind: http-request
name: Send Message (Admin)
method: POST
url: '{{baseUrl}}/api/messages/send'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "studentId": "{{userId}}",
      "subject": "Internship Update",
      "content": "Your internship has been approved."
    }
