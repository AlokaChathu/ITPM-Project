$kind: http-request
name: Submit Feedback (Company)
method: POST
url: '{{baseUrl}}/api/feedback/submit'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "studentId": "{{userId}}",
      "rating": 5,
      "comments": "Excellent performance during internship."
    }
